# Hugo configuration file
baseURL: "http://localhost:1313/"
languageCode: "da-dk"
title: "Jonas R. Outzen"

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true

  highlight:
    noClasses: false

menu:
  main:
    - name: Projekter
      pageRef: /projects
      weight: 1

    - name: Docs
      pageRef: /docs
      weight: 2

    - name: Om mig
      pageRef: /about
      weight: 3

    - name: GitHub ↗
      url: "https://github.com/jonasoutzen"
      weight: 4
      params:
        icon: github

    - name: Search
      weight: 5
      params:
        type: search

params:
  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: true
    displayPoweredBy: false

  theme:
    default: system
    displayToggle: true

  editURL:
    enable: false