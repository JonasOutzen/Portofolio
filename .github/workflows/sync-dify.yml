const SITE_URL = process.env.SITE_BASE_URL;
const DIFY_API_KEY = process.env.DIFY_API_KEY;

async function main() {
  console.log("Fetching site via Jina...");

  const jinaUrl = `https://r.jina.ai/${SITE_URL}`;
  const res = await fetch(jinaUrl);

  if (!res.ok) {
    throw new Error("Failed to fetch site from Jina");
  }

  const content = await res.text();

  console.log("Sending to Dify...");

  const response = await fetch("https://api.dify.ai/v1/chat-messages", {
    method: "POST",
    headers: {
      Authorization: `Bearer ${DIFY_API_KEY}`,
      "Content-Type": "application/json",
    },
    body: JSON.stringify({
      inputs: {
        website_content: content,
      },
      query: "Store this website content for future answers.",
      response_mode: "blocking",
      user: "github-action",
    }),
  });

  const data = await response.json();
  console.log("Dify response:", data);
}

main().catch(console.error);