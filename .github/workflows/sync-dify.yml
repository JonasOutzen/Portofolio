name: Sync Dify Knowledge

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Sync site to Dify
        env:
          DIFY_API_KEY: ${{ secrets.DIFY_API_KEY }}
          SITE_BASE_URL: ${{ secrets.SITE_BASE_URL }}
        run: node scripts/sync-dify.mjs