name: Build and deploy knowledge base

on:
  push:
    branches: [main]
    paths:
      - 'content/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build knowledge.json
        run: node scripts/build-knowledge.mjs

      - name: Commit knowledge.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/knowledge.json
          git diff --staged --quiet || git commit -m "chore: update knowledge.json"
          git push