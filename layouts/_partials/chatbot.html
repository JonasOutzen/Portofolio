<div id="chatbot-root">
  <button id="chatbot-toggle">Chat</button>
  <div id="chatbot-panel" hidden>
    <div id="chatbot-messages"></div>
    <form id="chatbot-form">
      <input id="chatbot-input" type="text" placeholder="Ask about Jonas or his projects" />
      <button type="submit">Send</button>
    </form>
  </div>
</div>

<style>
  #chatbot-root {
    position: fixed;
    right: 20px;
    bottom: 20px;
    z-index: 9999;
    font-family: system-ui, sans-serif;
  }
  #chatbot-toggle {
    border: none;
    border-radius: 999px;
    padding: 12px 16px;
    cursor: pointer;
  }
  #chatbot-panel {
    width: 320px;
    height: 420px;
    margin-top: 10px;
    background: white;
    color: black;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,.2);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  #chatbot-messages {
    flex: 1;
    padding: 12px;
    overflow-y: auto;
    font-size: 14px;
  }
  #chatbot-form {
    display: flex;
    border-top: 1px solid #ddd;
  }
  #chatbot-input {
    flex: 1;
    padding: 12px;
    border: none;
    outline: none;
  }
  #chatbot-form button {
    border: none;
    padding: 0 14px;
    cursor: pointer;
  }
  .msg {
    margin-bottom: 10px;
    white-space: pre-wrap;
  }
  .user {
    font-weight: 600;
  }
</style>

<script>
  (() => {
    const apiUrl = "https://YOUR-WORKER-URL.workers.dev";
    const toggle = document.getElementById("chatbot-toggle");
    const panel = document.getElementById("chatbot-panel");
    const form = document.getElementById("chatbot-form");
    const input = document.getElementById("chatbot-input");
    const messages = document.getElementById("chatbot-messages");

    toggle.addEventListener("click", () => {
      panel.hidden = !panel.hidden;
    });

    function addMessage(text, role) {
      const div = document.createElement("div");
      div.className = `msg ${role}`;
      div.textContent = `${role === "user" ? "You" : "Jonas Bot"}: ${text}`;
      messages.appendChild(div);
      messages.scrollTop = messages.scrollHeight;
    }

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const message = input.value.trim();
      if (!message) return;

      addMessage(message, "user");
      input.value = "";

      try {
        const res = await fetch(apiUrl, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message }),
        });

        const data = await res.json();
        addMessage(data.answer || "Something went wrong.", "bot");
      } catch {
        addMessage("Sorry, the chat service is unavailable right now.", "bot");
      }
    });
  })();
</script>
